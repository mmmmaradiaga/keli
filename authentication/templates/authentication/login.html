{% extends "base.html" %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <div style="background:var(--card); border:1px solid var(--border); border-radius:18px; padding:32px; width:100%; max-width:400px;">

    <div class="serif" style="font-size:24px; font-weight:600; margin-bottom:8px;">Welcome back</div>
    <div style="color:var(--ink3); font-size:14px; margin-bottom:24px;">Sign in to Sonder</div>

    <form method="POST">
      {% csrf_token %}

      {% if form.errors %}
        <div style="padding:10px 14px; background:rgba(200,75,47,0.08); border:1px solid rgba(200,75,47,0.2); border-radius:10px; font-size:13px; color:var(--accent); margin-bottom:16px;">
          Invalid username or password.
        </div>
      {% endif %}

      <div style="margin-bottom:16px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">Username</label>
        <input
          type="text"
          name="username"
          autofocus
          required
          style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--ink); font-family:'Figtree',sans-serif; font-size:15px; outline:none;"
        />
      </div>

      <div style="margin-bottom:24px;">
        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:6px;">Password</label>
        <input
          type="password"
          name="password"
          required
          style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--ink); font-family:'Figtree',sans-serif; font-size:15px; outline:none;"
        />
      </div>

      <button type="submit" class="post-btn">Sign in</button>

    </form>

    <div style="text-align:center; margin-top:16px; font-size:13px; color:var(--ink3);">
      Don't have an account? <a href="{% url 'authentication:signup' %}" style="color:var(--accent); font-weight:600;">Sign up</a>
    </div>

  </div>
</div>
{% endblock %}
