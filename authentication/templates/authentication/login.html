{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SocialApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-96">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Welcome Back</h2>
        <form method="get" action="{% url 'accounts:dashboard' %}" class="space-y-5">
            <input type="email" name="email" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <input type="password" name="password" placeholder="Password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-lg font-semibold transition">Login</button>
        </form>
        <p class="text-center mt-6 text-gray-500">Don't have an account? 
            <a href="{% url 'authentication:signup' %}" class="text-indigo-500 font-semibold hover:underline">Sign Up</a>
        </p>
    </div>
</body>
</html>
